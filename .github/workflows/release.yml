name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy server script
        run: cp src/server.mjs scripts/server.mjs

      - name: Package module
        run: |
          zip -r module.zip module.json lang/ scripts/ images/ README.md CHANGELOG.md LICENSE

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: module.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
